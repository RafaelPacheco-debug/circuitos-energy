server.port=${PORT:8081}

spring.datasource.url=jdbc:h2:file:./data/circuitos-energy;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false
app.seed-default-users=true
app.admin.bootstrap.enabled=true
app.admin.username=Rafael
app.admin.password=1234
app.admin.full-name=Administrador
app.admin.email=admin@circuitos.pt
