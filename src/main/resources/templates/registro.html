<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registar - Circuitos Energy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/theme.css" rel="stylesheet">
</head>
<body style="background:var(--color-background);">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <h3 class="card-title mb-3">Criar conta</h3>
            <p class="text-muted mb-4">Crie uma conta para aceder ao seu perfil e aos serviços.</p>

            <div th:if="${success}" class="alert alert-success">
              Conta criada com sucesso! Agora pode fazer login.
            </div>

            <form th:action="@{/registro}" th:object="${registrationForm}" method="post">
              <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Nome de utilizador</label>
                  <input type="text" th:field="*{username}" class="form-control" placeholder="Digite um nome de utilizador" required>
                  <div th:if="${#fields.hasErrors('username')}" class="text-danger small" th:errors="*{username}"></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Nome completo</label>
                  <input type="text" th:field="*{fullName}" class="form-control" placeholder="Seu nome completo" required>
                  <div th:if="${#fields.hasErrors('fullName')}" class="text-danger small" th:errors="*{fullName}"></div>
                </div>
              </div>

              <div class="mb-3 mt-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="email@exemplo.com" required>
                <div th:if="${#fields.hasErrors('email')}" class="text-danger small" th:errors="*{email}"></div>
              </div>

              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Senha</label>
                  <input type="password" th:field="*{password}" class="form-control" placeholder="Mínimo 6 caracteres" required>
                  <div th:if="${#fields.hasErrors('password')}" class="text-danger small" th:errors="*{password}"></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Confirmar senha</label>
                  <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="Repita a senha" required>
                  <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger small" th:errors="*{confirmPassword}"></div>
                </div>
              </div>

              <div class="d-flex justify-content-between align-items-center mt-4">
                <a href="/login" class="btn btn-link">Já tem conta? Entrar</a>
                <button type="submit" class="btn btn-primary">Criar conta</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
