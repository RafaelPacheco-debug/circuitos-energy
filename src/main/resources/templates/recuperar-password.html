<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recuperar palavra-passe - Circuitos Energy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/theme.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(7,33,32,.78), rgba(15,23,42,.58)),
        url('/images/home-servicos.jpg?v=4') center/cover fixed;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .info-card {
      max-width: 520px;
      width: 100%;
      border-radius: 20px;
      background: rgba(255,255,255,.95);
      box-shadow: 0 24px 70px rgba(15,23,42,.28);
    }

    .brand-logo {
      max-height: 62px;
      width: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <main class="info-card p-4 p-sm-5 text-center">
    <img th:src="@{/images/logo-circuitos-energy.png(v=4)}" src="/images/logo-circuitos-energy.png?v=4" alt="Circuitos Energy" class="brand-logo mb-4">
    <div class="display-6 text-primary mb-3"><i class="bi bi-key"></i></div>
    <h1 class="h3 fw-bold mb-3">Recuperacao de palavra-passe</h1>
    <p class="text-muted mb-4">Funcionalidade de recuperacao de palavra-passe prevista para evolucao futura.</p>
    <a th:href="@{/login}" class="btn btn-primary px-4">Voltar ao login</a>
  </main>
</body>
</html>
