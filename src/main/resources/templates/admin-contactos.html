<div th:fragment="conteudo" class="container-fluid">

  <!-- Título -->
  <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
          <h1 class="h3 fw-bold">
              <i class="fas fa-envelope me-2 text-primary"></i>
              Mensagens Recebidas
          </h1>
          <p class="text-muted mb-0">
              Lista de contactos enviados através do formulário do site.
          </p>
      </div>

      <span class="badge bg-primary fs-6">
          <span th:text="${#lists.size(mensagens)}">0</span> mensagens
      </span>
  </div>


  <!-- Card -->
  <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body">

          <div class="table-responsive">

              <table class="table table-hover align-middle">

                  <thead class="table-light">
                      <tr>
                          <th>ID</th>
                          <th>Nome</th>
                          <th>Email</th>
                          <th>Telefone</th>
                          <th>Mensagem</th>
                          <th>Data</th>
                      </tr>
                  </thead>

                  <tbody>

                      <tr th:each="m : ${mensagens}">

                          <td>
                              <span class="badge bg-secondary"
                                    th:text="${m.id}"></span>
                          </td>

                          <td>
                              <i class="fas fa-user text-muted me-1"></i>
                              <span th:text="${m.nome}"></span>
                          </td>

                          <td>
                              <i class="fas fa-envelope text-muted me-1"></i>
                              <span th:text="${m.email}"></span>
                          </td>

                          <td>
                              <i class="fas fa-phone text-muted me-1"></i>
                              <span th:text="${m.telefone}"></span>
                          </td>

                          <td style="max-width:300px;">
                              <span th:text="${m.mensagem}"></span>
                          </td>

                          <td>
                              <span class="text-muted"
                                    th:text="${#temporals.format(m.criadoEm, 'dd/MM/yyyy HH:mm')}">
                              </span>
                          </td>

                      </tr>

                  </tbody>

              </table>

          </div>

      </div>
  </div>

</div>
