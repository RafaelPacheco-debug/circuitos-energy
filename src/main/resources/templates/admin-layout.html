<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Circuitos Energy</title>

    <!-- Bootstrap + FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/theme.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .sidebar {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-hover) 100%);
            min-height: 100vh;
            color: white;
            position: sticky;
            top: 0;
        }

        .sidebar .brand {
            font-weight: 800;
            letter-spacing: .2px;
        }

        .sidebar .nav-link {
            color: rgba(255,255,255,0.85);
            transition: all 0.2s;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
        }

        .sidebar .nav-link:hover {
            color: white;
            background-color: rgba(255,255,255,0.12);
        }

        .sidebar .nav-link.active {
            color: white;
            background-color: rgba(255,255,255,0.18);
        }

        .header {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-radius: 14px;
        }

        .content-wrap {
            padding: 22px 18px 34px;
        }

        .card {
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.15s;
            border-radius: 14px;
        }
        .card:hover { transform: translateY(-2px); }

        /* mobile sidebar spacing */
        @media (max-width: 767px) {
            .sidebar { min-height: auto; position: relative; }
        }
    </style>
</head>

<body>
<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR (mantém os links do 1º código) -->
        <nav class="col-md-2 d-md-block sidebar p-3">
            <div class="text-center mb-4">
                <div class="brand fs-5">
                    <i class="fas fa-bolt"></i> Circuitos Energy
                </div>
                <div style="opacity:.85; font-size:12px;">Painel de Administração</div>
            </div>

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activeSection == 'dashboard'} ? ' active' : ''" th:href="@{/admin}">
                        <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activeSection == 'servicos'} ? ' active' : ''" th:href="@{/admin/servicos}">
                        <i class="fas fa-list-check me-2"></i> Serviços
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activeSection == 'agendamentos'} ? ' active' : ''" th:href="@{/admin/agendamentos}">
                        <i class="fas fa-calendar-check me-2"></i> Agendamentos
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activeSection == 'encomendas'} ? ' active' : ''" th:href="@{/admin/encomendas}">
                        <i class="fas fa-bag-shopping me-2"></i> Encomendas
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activeSection == 'orcamentos-impressos'} ? ' active' : ''" th:href="@{/admin/orcamentos-impressos}">
                        <i class="fas fa-file-invoice me-2"></i> Orçamentos Impressos
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activeSection == 'ferramentas-utilizador'} ? ' active' : ''" th:href="@{/admin/ferramentas-utilizador}">
                        <i class="fas fa-screwdriver-wrench me-2"></i> Ferramentas de Utilizador
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/ferramentas/solar}">
                        <i class="fas fa-solar-panel me-2"></i> Calculadora Solar
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activeSection == 'contactos'} ? ' active' : ''" th:href="@{/admin/contactos}">
                        <i class="fas fa-envelope me-2"></i> Contactos
                    </a>
                </li>

                <hr style="border-color: rgba(255,255,255,.22);">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/servicos}">
                        <i class="fas fa-globe me-2"></i> Ver Site
                    </a>
                </li>

                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="nav-link w-100 text-start" style="background:none;border:0;">
                            <i class="fas fa-right-from-bracket me-2"></i> Logout
                        </button>
                    </form>
                </li>
            </ul>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="col-md-10 ms-sm-auto content-wrap">

            <!-- Header fixo do layout (opcional) -->
            <div class="header p-4 mb-4">
                <h1 class="h3 mb-1">Administração</h1>
                <p class="text-muted mb-0">Gira o site e os conteúdos de forma rápida.</p>
            </div>

            <!-- ✅ AQUI mantém a funcionalidade do 1º código -->
            <!-- vai carregar admin-dashboard, admin-servicos, admin-contactos, etc. -->
            <div th:replace="~{__${conteudo}__}"></div>

        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
