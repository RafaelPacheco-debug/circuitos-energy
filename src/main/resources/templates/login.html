<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar - Circuitos Energy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/theme.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(135deg, rgba(7, 33, 32, .78), rgba(15, 23, 42, .58)),
        url('/images/home-hero.jpg?v=4') center/cover fixed;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 24px;
    }

    .login-card {
      max-width: 440px;
      width: 100%;
      border: 1px solid rgba(255,255,255,.38);
      border-radius: 20px;
      box-shadow: 0 24px 70px rgba(15,23,42,.28);
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(10px);
    }

    .brand-logo {
      max-height: 64px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .form-control {
      min-height: 46px;
      border-radius: 10px;
    }

    .btn-primary {
      min-height: 46px;
      border-radius: 10px;
      font-weight: 700;
    }

    .support-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .support-item {
      border-radius: 12px;
      background: #f1f5f9;
      padding: 10px;
      color: #475569;
      font-size: .9rem;
    }

    .support-item i {
      color: var(--color-primary);
    }
  </style>
</head>
<body>
  <main class="login-card p-4 p-sm-5">
    <div class="mb-4 text-center">
      <img th:src="@{/images/logo-circuitos-energy.png(v=4)}" src="/images/logo-circuitos-energy.png?v=4" alt="Circuitos Energy" class="brand-logo mx-auto mb-3">
      <h1 class="h3 fw-bold mb-2">Entrar na sua conta</h1>
      <p class="text-muted mb-0">Aceda ao perfil, ferramentas solares e area administrativa.</p>
    </div>

    <div class="support-row mb-4">
      <div class="support-item"><i class="bi bi-shield-lock me-1"></i> Acesso seguro</div>
      <div class="support-item"><i class="bi bi-sun me-1"></i> Simuladores</div>
    </div>

    <div th:if="${param.error}" class="alert alert-danger" role="alert">
      Utilizador ou palavra-passe invalidos. Tente novamente.
    </div>
    <div th:if="${param.logout}" class="alert alert-success" role="alert">
      Sessao terminada com sucesso.
    </div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="mb-3">
        <label for="username" class="form-label">Username ou email</label>
        <input type="text" class="form-control" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="mb-2">
        <label for="password" class="form-label">Palavra-passe</label>
        <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="text-end mb-4">
        <a th:href="@{/recuperar-password}" class="small text-muted">Esqueceu-se da palavra-passe?</a>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <div class="d-flex justify-content-between align-items-center mt-4">
      <a href="/" class="text-muted">Voltar ao inicio</a>
      <a href="/registro" class="text-muted">Criar conta</a>
    </div>
  </main>
</body>
</html>
