<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar - Circuitos Energy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/theme.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    }
    .card {
      max-width: 420px;
      width: 100%;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15,23,36,0.08);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--color-primary);
    }
    .brand span {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #99f6e4 0%, var(--color-primary) 100%);
      color: #fff;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="card p-4">
    <div class="mb-4 text-center">
      <div class="brand mb-2">
        <span>CE</span>
        <span>Circuitos Energy</span>
      </div>
      <p class="text-muted mb-0">Faça login para aceder às funcionalidades.</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger" role="alert">
      Usuário ou senha inválidos. Tente novamente.
    </div>
    <div th:if="${param.logout}" class="alert alert-success" role="alert">
      Sessão terminada com sucesso.
    </div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="mb-3">
        <label for="username" class="form-label">Usuário</label>
        <input type="text" class="form-control" id="username" name="username" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Senha</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <div class="d-flex justify-content-between align-items-center mt-3">
      <a href="/" class="text-muted">Voltar ao início</a>
      <a href="/registro" class="text-muted">Criar conta</a>
    </div>
  </div>
</body>
</html>
