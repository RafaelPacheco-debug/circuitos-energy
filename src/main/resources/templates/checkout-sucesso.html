<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compra concluída | Circuitos Energy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/theme.css" rel="stylesheet">
  <style>
    body { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial; background:#f6f8fb; color:#0f1724; }
    .shell { max-width: 760px; margin: 0 auto; padding: 72px 18px; }
    .card-box { background:#fff; border:1px solid rgba(15,23,36,.08); border-radius: 22px; box-shadow: 0 20px 44px rgba(15,23,36,.06); padding: 36px; text-align:center; }
    .icon { width: 84px; height: 84px; margin: 0 auto 18px; border-radius: 24px; display:flex; align-items:center; justify-content:center; background: rgba(22,163,74,.12); color:#15803d; font-size: 2.2rem; }
    h1 { margin:0 0 12px; font-size: clamp(2rem, 4vw, 2.8rem); letter-spacing: -.04em; }
    p { margin:0 auto 24px; color:#64748b; max-width: 54ch; line-height:1.8; }
  </style>
</head>
<body>
  <main class="shell">
    <div class="card-box">
      <div class="icon">✓</div>
      <h1>Compra concluída com sucesso</h1>
      <p>A sua encomenda foi registada corretamente, o carrinho foi limpo e a compra já está disponível na área de administração.</p>
      <div class="d-flex justify-content-center gap-2 flex-wrap">
        <a class="btn btn-primary" href="/servicos">Continuar a comprar</a>
        <a class="btn btn-outline-secondary" href="/">Voltar ao início</a>
      </div>
    </div>
  </main>
</body>
</html>
